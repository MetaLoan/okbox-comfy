app = 'okbox-video-storage'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'video_data'
  destination = '/data'

[env]
  MAX_AGE_HOURS = '72'
