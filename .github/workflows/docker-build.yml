name: Build and Push Serverless Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.serverless'
      - 'pythonfiles/runpod_worker.py'
      - 'workflow/dual_wan_i2v_api.json'
      - 'doc/extra_model_paths.yaml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: metaloan/okbox-comfy

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.serverless
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:serverless-v11
